<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP會員方案</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f1a;
  color:white;
  text-align:center;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:40px 20px;
}

h1 {
  font-size:42px;
  margin-bottom:10px;
}

.subtitle {
  color:#aaa;
  margin-bottom:40px;
}

.plans {
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.plan {
  background:#111827;
  padding:30px;
  border-radius:12px;
  width:300px;
  transition:0.3s;
}

.plan:hover {
  transform:translateY(-5px);
}

.price {
  font-size:36px;
  margin:20px 0;
  color:#00ffcc;
}

.features {
  text-align:left;
  margin:20px 0;
  line-height:1.8;
}

.btn {
  display:inline-block;
  padding:12px 20px;
  border-radius:6px;
  text-decoration:none;
  color:white;
  font-weight:bold;
}

.telegram { background:#2CA5E0; }
.patreon { background:#E85B46; }

.badge {
  background:#00ffcc;
  color:black;
  padding:5px 10px;
  border-radius:6px;
  font-size:12px;
}

.qr {
  margin-top:40px;
}

.footer {
  margin-top:60px;
  color:#666;
  font-size:13px;
}
</style>

</head>

<body>

<div class="container">

<h1>🚀 美股VIP會員</h1>

    <a href="https://t.me/hktrade2024" class="btn telegram">

  </div>

    <a href="https://www.patreon.com/c/hktrade2022" class="btn patreon">

  </div>

      ✔ 專屬群組<br>

    </div>

    <a href="https://t.me/hktrade2024" class="btn telegram">
      聯繫加入
    </a>
  </div>

</div>

<div class="qr">
  <h3>📱 掃碼加入</h3>
  <img src="your-qr.png" width="200">
</div>

<div class="footer">
© 2026 美股數據頻道
</div>

</div>

</html>
