body {

  background: #0b0f1a;
  color: #fff;
}

.container {

h1 {

.plans {

.plan {

  padding: 25px;

.plan:hover {

.badge {

  display: inline-block;

  color: #00ffcc;
}

.features {
  text-align: left;
  line-height: 1.8;
  margin-bottom: 20px;
  font-size: 14px;
}

.btn {
  display: inline-block;
  width: 100%;
  padding: 12px;
  border-radius: 6px;
  text-decoration: none;
  font-weight: bold;
  color: white;
}

.telegram { background: #2CA5E0; }
.patreon { background: #E85B46; }

.qr {
  margin-top: 40px;
}

.qr img {
  max-width: 180px;
}

.footer {
  margin-top: 50px;
  font-size: 13px;
  color: #666;
}

/* MOBILE */
@media (max-width: 768px) {
  h1 { font-size: 28px; }
  .plan { width: 100%; }
}
</style>
</head>
